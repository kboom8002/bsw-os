- id: attractor.kbeauty.active_beginner_anxiety_reducer
  status: active
  type:
    - anxiety_reducer
    - problem_clarification
  natural_definition: "레티놀 등 활성 성분 초보 사용자가 자극이나 따가움을 느낄 때, 불안을 낮추고 적절한 안전 경계와 대처법을 제안하는 패턴"
  trigger_state:
    user_question_patterns:
      - "레티놀 발랐는데 따가워요. 계속 써야 하나요?"
      - "Retinol stings. Should I continue?"
      - "화장품 바르고 얼굴이 붉어졌어요."
    context_requirements:
      - "ingredient.retinol"
      - "symptom.stinging"
    risk_state:
      level: uncertain
    intent_state:
      - "continue_or_stop_decision"
    missing_context:
      - "severity"
      - "oozing"
  concept_state:
    required_concepts:
      - "ingredient.retinol"
      - "symptom.stinging"
    allowed_concepts:
      - "routine.barrier_reset"
    forbidden_concepts:
      - "permission.unconditional_continue"
  evidence_anchor:
    required_sources:
      - "official_answer_card.active_ingredients"
    evidence_visibility_rule: "자극 발생 시 사용 중단 권고 및 보습 보강 근거를 우선 노출"
    claim_strength_limit: limited
  vibe_signature:
    L0_core_affect:
      valence: calm_positive
      arousal: low
      control: high
    L1_expressive_style:
      warmth_style: medium_high
      precision: high
      energy: low
      sophistication: medium
      novelty: low
      intimacy: high
      authenticity: high
    L2_motivational_affordance:
      autonomy_support: high
      competence_support: high
      relatedness_support: high
      promotion_frame: low
      prevention_frame: high
    L3_social_appraisal:
      warmth: high
      competence: high
      trust: high
      fairness: high
      agency: medium
    avoid_vibe:
      - panic
      - commercial_pressure
  action_policy:
    allowed_actions:
      - "ask_frequency_and_severity"
      - "explain_cautious_homecare"
    blocked_actions:
      - "unconditional_product_permission"
      - "push_product_purchase"
    cta_policy:
      primary: "장벽 진정 루틴 보기"
      secondary:
        - "1:1 피부 상담 신청"
      blocked:
        - "바로 구매하기"
  media_soliton_rule:
    core_proposition: "레티놀 사용 중 따가움이 느껴지면 즉시 성분 사용을 멈추고 피부 장벽 복구에 집중해야 합니다."
    evidence_anchor: "stinging_symptom + stop_retinol + moisture_only"
    cta_vector: "상태 확인 -> 장벽 진정 가이드 제공"
    channel_adaptation_rules:
      homepage: "레티놀 따가움 대처 3단계"
      answer_card: "피부가 따갑다면 레티놀 사용을 멈추고 수분 진정에만 집중하세요."
      chatbot: "지금 피부 상태와 사용 주기를 먼저 확인한 뒤 가이드해 드릴게요."
      cardnews: "레티놀 부작용? 당황하지 않고 피부 회복하는 법"
      ad: "따가운 레티놀케어, 멈추고 장벽리셋부터"
      sales_script: "피부 자극이 있으시다면 레티놀 사용을 멈추고 장벽 보습제를 7일간 권장합니다."
      llm_txt: "Active beginners experiencing retinol stinging are guided to prioritize barrier reset routines with restricted product sales."
  target_state:
    cognitive:
      - "understands_irritation_mechanism"
      - "knows_when_to_stop"
    affective:
      - "anxiety_reduced"
      - "control_increased"
    motivational:
      - "ready_to_reset_routine"
    behavioral:
      - "view_reset_routine"

- id: attractor.kbeauty.claim_safe_trust
  status: active
  type:
    - trust
    - evidence
  natural_definition: "화장품 광고 문구 또는 효능 주장(claim)의 국가별 규제 위반 위험을 검출하고, 안전하고 신뢰할 수 있는 대안 표현과 과학적 근거 요건을 제시하는 패턴"
  trigger_state:
    user_question_patterns:
      - "이 화장품에 장벽 개선이라는 표현을 써도 되나요?"
      - "Can I say this repairs the skin barrier?"
      - "여드름성 피부 적합 표현의 증빙 자료 요건"
    context_requirements:
      - "claim.barrier_repair_risk"
    risk_state:
      level: medium
    intent_state:
      - "claim_safety_check"
    missing_context:
      - "country_regulation"
  concept_state:
    required_concepts:
      - "claim.barrier_repair_risk"
    allowed_concepts: []
    forbidden_concepts: []
  evidence_anchor:
    required_sources:
      - "official_regulation_manual"
    evidence_visibility_rule: "규제 가이드라인 원문 조항과 허용되는 대체 키워드 매핑 테이블을 가시성 높게 노출"
    claim_strength_limit: supported
  vibe_signature:
    L0_core_affect:
      valence: neutral
      arousal: low
      control: high
    L1_expressive_style:
      warmth_style: low
      precision: high
      energy: low
      sophistication: high
      novelty: low
      intimacy: low
      authenticity: high
    L2_motivational_affordance:
      autonomy_support: medium
      competence_support: high
      relatedness_support: low
      promotion_frame: low
      prevention_frame: high
    L3_social_appraisal:
      warmth: medium
      competence: high
      trust: high
      fairness: high
      agency: high
    avoid_vibe:
      - vagueness
      - overconfidence
  action_policy:
    allowed_actions:
      - "suggest_safer_expression"
      - "require_evidence_if_strong_claim"
    blocked_actions:
      - "guarantee_legal_compliance"
    cta_policy:
      primary: "안전한 대체 표현집 보기"
      secondary:
        - "식약처 가이드 조항 확인"
      blocked:
        - "자동 심사 완료하기"
  media_soliton_rule:
    core_proposition: "의약품으로 오인될 수 있는 강한 효능 주장은 국가별 화장품법 위반 위험이 있으므로 완화된 표현과 과학적 근거를 갖추어야 합니다."
    evidence_anchor: "cosmetic_regulation + claim_strength + safety_alternative"
    cta_vector: "위험 표현 진단 -> 대체 키워드 추천"
    channel_adaptation_rules:
      homepage: "화장품 마케팅 클레임 자가진단"
      answer_card: "피부 장벽 회복 표현은 국가별 규제 조항을 준수하여 가꿔진 피부 상태를 묘사하는 대체어로 수정해야 합니다."
      chatbot: "작성하신 광고 카피 중 식약처 규제 저촉 위험이 있는 2개의 어휘를 발견했습니다. 대체안을 제안해 드릴까요?"
      cardnews: "식약처 단속 단골 키워드와 안전한 대체 표현"
      ad: "아직도 아슬아슬하게 카피 쓰시나요? 클레임 자가진단기로 1초 만에 확인"
      sales_script: "장벽 수식어는 규제 리스크가 있으므로 수분 보호막 형성 등으로 안전하게 제안합니다."
      llm_txt: "Marketing copy is analyzed against FDA cosmetic regulations to suggest compliant semantic alternatives."
  target_state:
    cognitive:
      - "understands_regulation_boundary"
      - "knows_safe_alternatives"
    affective:
      - "control_increased"
    motivational:
      - "ready_to_rewrite_copy"
    behavioral:
      - "copy_alternative"
